<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HarvestScope</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --green:#39e07a; --yellow:#f5c842; --orange:#f57c42; --red:#f5424e;
  --panel-bg:rgba(4,9,18,0.94); --border:rgba(255,255,255,0.10);
}
* { box-sizing:border-box; margin:0; padding:0; }
html, body { width:100%; height:100%; overflow:hidden; font-family:'Barlow',sans-serif; background:#050e1c; }

/* ── MAP fills everything ── */
#map { position:absolute; inset:0; z-index:0; }

/* Scanline broadcast feel */
#map::after {
  content:''; position:absolute; inset:0; pointer-events:none; z-index:500;
  background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.025) 2px,rgba(0,0,0,0.025) 3px);
}

/* Darken satellite tiles so neon pins pop */
.leaflet-tile-pane { filter: brightness(0.55) saturate(0.8); }

/* ── PRODUCE PIN markers ── */
.pin {
  display:flex; flex-direction:column; align-items:center; gap:3px;
  cursor:pointer; transition:transform .15s;
}
.pin:hover { transform:scale(1.1); }
.pin-bubble {
  width:52px; height:52px; border-radius:50%;
  display:flex; align-items:center; justify-content:center; font-size:23px;
  position:relative; border:2.5px solid; backdrop-filter:blur(6px);
}
.g0,.g1,.g2,.g3 { /* colors now set via inline style by wxGlowStyle() */ }
.gx { background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.18); }
.pin-pulse {
  position:absolute; inset:-3px; border-radius:50%; pointer-events:none;
  animation:ppulse 2.4s ease infinite;
}
@keyframes ppulse { 0%{transform:scale(1);opacity:.55} 70%{transform:scale(2.3);opacity:0} 100%{transform:scale(2.3);opacity:0} }
.pin-wx { position:absolute; bottom:-4px; right:-6px; font-size:15px; line-height:1; filter:drop-shadow(0 1px 4px rgba(0,0,0,.9)); }
.pin-label {
  background:rgba(4,9,18,.86); border:1px solid rgba(255,255,255,.12);
  border-radius:8px; padding:2px 8px;
  display:flex; flex-direction:column; align-items:center;
  backdrop-filter:blur(10px); min-width:48px;
}
.pin-temp { font-family:'Barlow Condensed',sans-serif; font-size:14px; font-weight:800; color:#fff; line-height:1.2; }
.pin-cond { font-family:'Barlow Condensed',sans-serif; font-size:8px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; line-height:1; }

/* ── WEATHER OVERLAY markers ── */
.wx {
  display:flex; flex-direction:column; align-items:center; gap:1px;
  animation:wxin .7s ease both; pointer-events:none;
}
@keyframes wxin { from{opacity:0;transform:scale(.5)} to{opacity:1;transform:scale(1)} }
.wx-ico { font-size:26px; line-height:1; animation:wxbob 3s ease-in-out infinite; }
@keyframes wxbob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
.wx-tag {
  font-family:'Barlow Condensed',sans-serif; font-size:8px; font-weight:800;
  letter-spacing:1.5px; text-transform:uppercase;
  background:rgba(4,9,18,.78); border-radius:4px; padding:1px 5px;
  border:1px solid; white-space:nowrap; backdrop-filter:blur(8px);
}

/* ── TOP BAR ── */
#topbar {
  position:absolute; top:0; left:0; right:0; z-index:800; pointer-events:none;
  padding:10px 18px; display:flex; align-items:center; justify-content:space-between;
  background:linear-gradient(to bottom,rgba(4,9,18,.97) 45%,transparent);
}
#logo-name { font-family:'Barlow Condensed',sans-serif; font-size:24px; font-weight:900; color:#fff; letter-spacing:1px; }
#logo-sub  { font-family:'Barlow Condensed',sans-serif; font-size:9px; font-weight:700; letter-spacing:3px; color:var(--green); text-transform:uppercase; }
#live-badge { display:flex; align-items:center; gap:6px; font-family:'Barlow Condensed',sans-serif; font-size:10px; font-weight:700; letter-spacing:2px; color:var(--green); text-transform:uppercase; }
.ldot { width:6px; height:6px; border-radius:50%; background:var(--green); animation:blink 1.4s ease infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.15} }

/* ── PICKER ── */
#picker {
  position:absolute; bottom:0; left:0; right:0; z-index:800;
  padding:8px 16px 14px;
  background:linear-gradient(to top,rgba(4,9,18,.98) 60%,transparent);
}
#cat-tabs { display:flex; gap:6px; margin-bottom:7px; }
.cat-tab {
  font-family:'Barlow Condensed',sans-serif; font-size:9px; font-weight:800;
  letter-spacing:2px; text-transform:uppercase; padding:3px 10px; border-radius:100px;
  border:1.5px solid rgba(255,255,255,.12); background:rgba(255,255,255,.04);
  color:rgba(255,255,255,.3); cursor:pointer; transition:all .15s;
}
.cat-tab:hover { color:rgba(255,255,255,.6); border-color:rgba(255,255,255,.25); }
.cat-tab.active { border-color:var(--green); background:rgba(57,224,122,.1); color:var(--green); }
#pills { display:flex; gap:5px; overflow-x:auto; padding-bottom:2px; scrollbar-width:none; }
#pills::-webkit-scrollbar { display:none; }
.pill {
  display:flex; align-items:center; gap:5px; padding:5px 13px; border-radius:100px;
  border:1.5px solid rgba(255,255,255,.13); background:rgba(255,255,255,.05);
  color:rgba(255,255,255,.45); font-family:'Barlow Condensed',sans-serif;
  font-size:13px; font-weight:700; cursor:pointer; transition:all .18s; white-space:nowrap;
  backdrop-filter:blur(6px); flex-shrink:0;
}
.pill:hover  { border-color:rgba(255,255,255,.3); color:rgba(255,255,255,.8); }
.pill.active { border-color:var(--green); background:rgba(57,224,122,.12); color:#fff; box-shadow:0 0 14px rgba(57,224,122,.2); }

/* ── DETAIL PANEL — right side, compact ── */
#detail {
  position:absolute; top:60px; right:14px; z-index:810;
  width:320px; max-height:calc(100vh - 170px);
  background:var(--panel-bg); border:1px solid var(--border); border-radius:13px;
  backdrop-filter:blur(28px); padding:10px 12px; display:none;
  animation:sup .2s ease; overflow-y:auto;
}
@keyframes sup { from{opacity:0;transform:translateX(10px)} to{opacity:1;transform:translateX(0)} }
#d-close { position:absolute; top:8px; right:10px; font-size:14px; color:rgba(255,255,255,.28); cursor:pointer; background:none; border:none; transition:color .12s; }
#d-close:hover { color:#fff; }
#d-top { display:flex; align-items:center; gap:7px; margin-bottom:7px; }
#d-emoji { font-size:24px; flex-shrink:0; }
#d-name   { font-family:'Barlow Condensed',sans-serif; font-size:20px; font-weight:900; color:#fff; text-transform:uppercase; line-height:1; }
#d-region { font-family:'Barlow Condensed',sans-serif; font-size:10px; font-weight:600; letter-spacing:.5px; color:rgba(255,255,255,.38); margin-top:1px; }
#d-badge  { margin-left:auto; flex-shrink:0; padding:2px 8px; border-radius:100px; font-family:'Barlow Condensed',sans-serif; font-size:9px; font-weight:800; letter-spacing:1px; text-transform:uppercase; }
#d-stats  { display:flex; border-top:1px solid var(--border); border-bottom:1px solid var(--border); margin-bottom:7px; }
.ds { flex:1; padding:5px 6px; border-right:1px solid var(--border); }
.ds:last-child { border-right:none; }
.ds-l { font-family:'Barlow Condensed',sans-serif; font-size:7px; font-weight:700; letter-spacing:1.5px; color:rgba(255,255,255,.28); text-transform:uppercase; margin-bottom:1px; }
.ds-v { font-family:'Barlow Condensed',sans-serif; font-size:16px; font-weight:800; color:#fff; line-height:1; }
.ds-s { font-size:8px; color:rgba(255,255,255,.32); margin-top:1px; }
#d-note { font-size:11px; color:rgba(255,255,255,.45); line-height:1.4; margin-bottom:6px; }
#d-usda { font-family:'Barlow Condensed',sans-serif; font-size:9px; letter-spacing:.4px; margin-bottom:2px; }
#d-usda a { color:var(--green); text-decoration:none; }
#d-usda a:hover { text-decoration:underline; }

/* ── SECONDARY REGION PINS — B&W, full opacity, clearly secondary ── */
.pin-sec {
  display:flex; flex-direction:column; align-items:center; gap:2px;
  pointer-events:none;
}
.pin-sec-bubble {
  width:38px; height:38px; border-radius:50%;
  display:flex; align-items:center; justify-content:center; font-size:16px;
  background:rgba(255,255,255,.10); border:2px solid rgba(255,255,255,.55);
  backdrop-filter:blur(4px) grayscale(1);
  filter:grayscale(1) brightness(0.85);
  box-shadow:0 0 10px rgba(255,255,255,.15);
}
.pin-sec-label {
  background:rgba(4,9,18,.82); border:1px solid rgba(255,255,255,.18);
  border-radius:6px; padding:2px 7px;
  display:flex; flex-direction:column; align-items:center;
}
.pin-sec-name  { font-family:'Barlow Condensed',sans-serif; font-size:9px; font-weight:700; color:rgba(255,255,255,.75); line-height:1.2; white-space:nowrap; }
.pin-sec-share { font-family:'Barlow Condensed',sans-serif; font-size:8px; color:rgba(255,255,255,.4); line-height:1; }

/* ── 5-DAY FORECAST ── */
#d-forecast { margin-top:9px; border-top:1px solid var(--border); padding-top:9px; }
.fc-label { font-family:'Barlow Condensed',sans-serif; font-size:8px; font-weight:700; letter-spacing:2px; color:rgba(255,255,255,.28); text-transform:uppercase; margin-bottom:6px; }
.fc-days { display:flex; gap:4px; }
.fc-day {
  flex:1; display:flex; flex-direction:column; align-items:center; gap:2px;
  background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.07);
  border-radius:7px; padding:5px 2px;
}
.fc-dow  { font-family:'Barlow Condensed',sans-serif; font-size:8px; font-weight:700; color:rgba(255,255,255,.35); text-transform:uppercase; letter-spacing:.5px; }
.fc-ico  { font-size:18px; line-height:1.1; }
.fc-tmp  { font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:800; color:#fff; line-height:1; }
.fc-bar  { width:100%; height:3px; border-radius:2px; background:rgba(255,255,255,.08); overflow:hidden; margin-top:1px; }
.fc-bar-fill { height:100%; border-radius:2px; background:#6899e8; transition:width .4s; }

/* ── SEASON CHART ── */
#d-season { margin-top:9px; border-top:1px solid var(--border); padding-top:9px; }
.sc-label { font-family:'Barlow Condensed',sans-serif; font-size:8px; font-weight:700; letter-spacing:2px; color:rgba(255,255,255,.28); text-transform:uppercase; margin-bottom:6px; }
.sc-wrap { position:relative; height:48px; }
.sc-bars { display:flex; gap:2px; height:28px; align-items:flex-end; }
.sc-bar { flex:1; border-radius:2px 2px 0 0; transition:height .3s; }
.sc-curve { position:absolute; top:0; left:0; right:0; height:28px; pointer-events:none; }
.sc-months { display:flex; margin-top:3px; }
.sc-mon { flex:1; font-family:'Barlow Condensed',sans-serif; font-size:7px; font-weight:700; color:rgba(255,255,255,.25); text-align:center; letter-spacing:0; }
.sc-mon.now { color:var(--green); }
.leaflet-control-zoom { border:1px solid rgba(255,255,255,.12) !important; background:rgba(4,9,18,.85) !important; }
.leaflet-control-zoom a { background:transparent !important; color:rgba(255,255,255,.55) !important; border-bottom:1px solid rgba(255,255,255,.1) !important; line-height:26px !important; }
.leaflet-control-zoom a:hover { color:#fff !important; }
.leaflet-control-attribution { display:none !important; }
/* Kill default marker blue dot */
.leaflet-div-icon { background:none !important; border:none !important; }

/* ══════════════════════════════════════════════════════════
   MOBILE LAYOUT — bottom drawer panel, single-row pills
   ══════════════════════════════════════════════════════════ */
@media (max-width: 768px) {
  /* Panel becomes bottom drawer */
  #detail {
    top: auto !important;
    bottom: 0 !important;
    right: 0 !important;
    left: 0 !important;
    width: 100% !important;
    max-height: 58vh !important;
    border-radius: 18px 18px 0 0 !important;
    border-left: none !important;
    border-right: none !important;
    border-bottom: none !important;
    padding: 14px 16px 120px !important;
    animation: slideup .28s cubic-bezier(.32,1,.4,1) !important;
  }
  #detail.closing {
    animation: slidedown .22s ease-in forwards !important;
  }
  @keyframes slideup {
    from { opacity:0; transform:translateY(100%); }
    to   { opacity:1; transform:translateY(0); }
  }
  @keyframes slidedown {
    from { opacity:1; transform:translateY(0); }
    to   { opacity:0; transform:translateY(100%); }
  }

  /* Drag handle visual hint */
  #detail::before {
    content:'';
    display:block;
    width:40px; height:4px;
    background:rgba(255,255,255,.25);
    border-radius:2px;
    margin:0 auto 12px;
  }

  /* Bigger, easier-to-tap close button on mobile */
  #d-close {
    top:10px !important;
    right:12px !important;
    font-size:18px !important;
    width:36px !important;
    height:36px !important;
    display:flex !important;
    align-items:center !important;
    justify-content:center !important;
    background:rgba(255,255,255,.08) !important;
    border-radius:50% !important;
    color:rgba(255,255,255,.6) !important;
  }

  /* Stats row — 2x2 grid on mobile */
  #d-stats { flex-wrap:wrap; }
  .ds { min-width:50%; border-bottom:1px solid var(--border); }
  .ds:nth-child(2) { border-right:none; }
  .ds:nth-child(3), .ds:nth-child(4) { border-bottom:none; }

  /* Picker — sits at very bottom, above drawer */
  #picker { padding:6px 12px 14px; }
  #cat-tabs { gap:5px; margin-bottom:6px; }
  .cat-tab { font-size:8px; padding:3px 8px; }
  #pills { gap:5px; -webkit-overflow-scrolling:touch; }
  .pill { font-size:12px; padding:4px 11px; }

  /* Top bar tighter */
  #topbar { padding:8px 14px; }
  #logo-name { font-size:20px; }
  #logo-sub  { font-size:8px; letter-spacing:2px; }

  /* Move zoom controls so they don't overlap panel */
  .leaflet-control-zoom { margin-bottom: 110px !important; }

  /* Season chart slightly taller bars on mobile */
  .sc-wrap { height:52px; }
  .sc-bars { height:32px; }
  .sc-curve { height:32px; }
}
</style>
</head>
<body>

<div id="map"></div>

<!-- TOP BAR -->
<div id="topbar">
  <div>
    <div id="logo-name">🌿 HarvestScope</div>
    <div id="logo-sub">Jeffco Produce Origins &amp; Live Weather</div>
  </div>
  <div id="live-badge"><div class="ldot"></div></div>
</div>

<!-- DETAIL PANEL -->
<div id="detail">
  <button id="d-close">✕</button>
  <div id="d-top">
    <span id="d-emoji"></span>
    <div><div id="d-name"></div><div id="d-region"></div></div>
    <div id="d-badge"></div>
  </div>
  <div id="d-stats">
    <div class="ds"><div class="ds-l">Temp</div><div class="ds-v" id="ds-temp">—</div><div class="ds-s">Current</div></div>
    <div class="ds"><div class="ds-l">7-Day Rain</div><div class="ds-v" id="ds-rain">—</div><div class="ds-s" id="ds-rain-s"></div></div>
    <div class="ds"><div class="ds-l">Conditions</div><div class="ds-v" id="ds-cond">—</div><div class="ds-s" id="ds-cond-s"></div></div>
    <div class="ds"><div class="ds-l">Supply Share</div><div class="ds-v" id="ds-share">—</div><div class="ds-s">of US imports</div></div>
  </div>
  <div id="d-note"></div>
  <div id="d-usda"></div>
  <div id="d-season"></div>
  <div id="d-forecast"></div>
</div>

<!-- PICKER -->
<div id="picker">
  <div id="cat-tabs">
    <button class="cat-tab active" data-cat="all">All</button>
    <button class="cat-tab" data-cat="fruit">🍓 Fruit</button>
    <button class="cat-tab" data-cat="veg">🥦 Veg</button>
  </div>
  <div id="pills"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
// ══════════════════════════════════════════════════════════
//  MAP — Leaflet with dark satellite-style tiles
//  Centered on Americas, no pan/zoom limits so user can explore
// ══════════════════════════════════════════════════════════
const map = L.map('map', {
  center: [35, -105],  // Western Americas bias — WA down to Chile all visible
  zoom: 3,
  zoomControl: false,
  attributionControl: false,
});
L.control.zoom({ position:'topright' }).addTo(map);

// ESRI World Imagery — real satellite photo tiles, no API key needed
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  maxZoom: 19,
  attribution: 'Tiles © Esri',
}).addTo(map);

// ══════════════════════════════════════════════════════════
//  PRODUCE — one primary sourcing region per item
// ══════════════════════════════════════════════════════════
// Inline SVG icons for produce that have no good emoji
const SVG = {
  broccolini: `<svg width="26" height="26" viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- stalk -->
    <rect x="12" y="12" width="2" height="12" fill="#4a8c3f"/>
    <!-- side branches -->
    <line x1="13" y1="17" x2="8"  y2="13" stroke="#4a8c3f" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="13" y1="15" x2="18" y2="11" stroke="#4a8c3f" stroke-width="1.5" stroke-linecap="round"/>
    <!-- florets -->
    <circle cx="13" cy="7"  r="4"   fill="#2d7a2a"/>
    <circle cx="8"  cy="11" r="3"   fill="#2d7a2a"/>
    <circle cx="18" cy="9"  r="3"   fill="#2d7a2a"/>
    <circle cx="10" cy="7"  r="2.5" fill="#3a8c36"/>

// Active overrides keyed by produce key
const OVERRIDES = {};

// Resolve a text string to { name, lat, lng }
// First checks the produce item's own known regions, then REGION_LOOKUP
function resolveRegion(key, text) {
  const q = text.toLowerCase().trim();
  const p = PRODUCE[key];
  const allRegions = [p.r, ...(p.alt || [])];

  // Try matching against known regions for this produce
  for (const r of allRegions) {
    const rn = r.name.toLowerCase();
    const rParts = rn.split(/[,\s]+/);
    if (rn.includes(q) || rParts.some(part => q.includes(part) && part.length > 3)) {
      return { name: r.name, lat: r.lat, lng: r.lng };
    }
  }

  // Fall back to general lookup — longest keyword match wins
  let best = null, bestLen = 0;
  for (const [kw, region] of Object.entries(REGION_LOOKUP)) {
    if (q.includes(kw) || kw.includes(q)) {
      if (kw.length > bestLen) { best = region; bestLen = kw.length; }
    }
  }
  return best;
}

// Apply an override: move the pin, re-fetch weather, update panel if open
function applyOverride(key, regionText, vendor) {
  const resolved = resolveRegion(key, regionText);
  if (!resolved) { console.warn(`VegWatch: couldn't resolve region "${regionText}" for ${key}`); return; }

  OVERRIDES[key] = { region: resolved, vendor: vendor || '', raw: regionText };

  // Move existing marker to new location
  if (leafMarkers[key]) {
    leafMarkers[key].setLatLng([resolved.lat, resolved.lng]);
  }

  // Re-fetch weather at new location
  fetchWx(key, resolved.lat, resolved.lng, true);

  // Refresh panel if this item is currently open
  if (activeKey === key) fillPanel(key);
}

// Clear a single override and restore defaults
function clearOverride(key) {
  if (!OVERRIDES[key]) return;
  delete OVERRIDES[key];
  const r = PRODUCE[key].r;
  if (leafMarkers[key]) leafMarkers[key].setLatLng([r.lat, r.lng]);
  fetchWx(key, r.lat, r.lng, true);
  if (activeKey === key) fillPanel(key);
}

// Fetch and parse the Google Sheet CSV
async function loadSheet() {
  if (!SHEET_CSV_URL) return;
  try {
    const res = await fetch(SHEET_CSV_URL);
    const text = await res.text();
    const rows = text.trim().split('\n').slice(1); // skip header row
    const seen = new Set();
    rows.forEach(row => {
      const cols = row.split(',').map(c => c.trim().replace(/^"|"$/g, ''));
      const [produceRaw, regionRaw, vendorRaw] = cols;
      if (!produceRaw || !regionRaw) return;
      // Match produce column to PRODUCE key (case-insensitive, spaces→underscores)
      const key = Object.keys(PRODUCE).find(k =>
        k === produceRaw.toLowerCase().replace(/\s+/g,'_') ||
        PRODUCE[k].name.toLowerCase() === produceRaw.toLowerCase()
      );
      if (!key) return;
      seen.add(key);
      applyOverride(key, regionRaw, vendorRaw);
    });
    // Clear overrides for items no longer in sheet
    Object.keys(OVERRIDES).forEach(k => { if (!seen.has(k)) clearOverride(k); });
  } catch(e) { console.warn('VegWatch: sheet load failed', e); }
}

// ══════════════════════════════════════════════════════════
//  WEATHER CLASSIFICATION
//  Always returns a condition — every station shows current weather.
//  Ordered: most severe first, catch-all at the bottom.
// ══════════════════════════════════════════════════════════
function classifyWx(tempC, precip7) {
  const tF = tempC * 9/5 + 32;

  // Severe / extreme
  if (tF >= 105)               return { emoji:'🔥', label:'EXTREME HEAT', color:'#f5224e' };
  if (precip7 >= 100)         return { emoji:'🌊', label:'FLOODING',      color:'#2050f0' };
  if (tF <= 15)                return { emoji:'🥶', label:'HARD FREEZE',  color:'#42d4f5' };
  if (precip7 >= 60)          return { emoji:'⛈️',  label:'HEAVY RAIN',   color:'#4870e8' };
  if (tF >= 95)                return { emoji:'☀️',  label:'HEAT WAVE',   color:'#f59200' };
  if (tF <= 28)                return { emoji:'❄️',  label:'FREEZE',      color:'#80d0f5' };

  // Notable
  if (precip7 >= 35)          return { emoji:'🌧️', label:'WET',           color:'#6899e8' };
  if (precip7 < 3 && tF > 85) return { emoji:'🏜️', label:'DROUGHT',      color:'#f5882a' };
  if (tF >= 88)                return { emoji:'🌡️', label:'VERY HOT',     color:'#f5b830' };
  if (tF <= 36)                return { emoji:'🌨️', label:'NEAR FREEZE',  color:'#a0d0f0' };
  if (precip7 >= 18)          return { emoji:'🌦️', label:'SHOWERY',      color:'#7899d8' };
  if (tF <= 45)                return { emoji:'🌬️', label:'COLD',         color:'#90c8e8' };
  if (precip7 < 5 && tF > 75) return { emoji:'🌤️', label:'DRY',          color:'#e8c030' };
  if (tF >= 78)                return { emoji:'🌞', label:'WARM',         color:'#d4a820' };

  // Catch-all — always show something
  if (precip7 >= 8)            return { emoji:'🌥️', label:'OVERCAST',     color:'#8899aa' };
  if (tF >= 60)                return { emoji:'🌈', label:'MILD',          color:'#70b888' };
  if (tF >= 48)                return { emoji:'🌥️', label:'COOL',         color:'#8899aa' };
  return                              { emoji:'🌨️', label:'CHILLY',        color:'#90b8d0' };
}

// ══════════════════════════════════════════════════════════
//  PIN COLORING — driven by classifyWx at that location,
//  same system as the weather overlays. No drought scoring.
// ══════════════════════════════════════════════════════════
function wxGlowStyle(wx) {
  // Returns inline style string for the bubble based on wx condition color
  if (!wx) return '';
  const c = wx.color;
  // Parse hex to rgba for background tint
  const r = parseInt(c.slice(1,3),16), g = parseInt(c.slice(3,5),16), b = parseInt(c.slice(5,7),16);
  return `background:rgba(${r},${g},${b},0.2);border-color:${c};box-shadow:0 0 22px rgba(${r},${g},${b},0.55)`;
}

// ══════════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════════
const wxData    = {};  // id → data | null
const leafMarkers = {}; // key → Leaflet marker
let activeKey   = null;

// ══════════════════════════════════════════════════════════
//  FETCH WEATHER
// ══════════════════════════════════════════════════════════
async function fetchWx(id, lat, lng, isProduce) {
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}`
      + `&current=temperature_2m&daily=precipitation_sum,temperature_2m_max`
      + `&timezone=auto&past_days=30&forecast_days=1`;
    const d = await (await fetch(url)).json();
    const tempC = d.current.temperature_2m;
    const precip = d.daily.precipitation_sum || [];
    const tempMax = d.daily.temperature_2m_max || [];
    const dates   = d.daily.time || [];
    // Last 5 days (most recent at end of array, exclude today's forecast)
    const last5 = [];
    const end = Math.min(precip.length, tempMax.length, dates.length);
    for (let i = Math.max(0, end - 6); i < end - 1; i++) {
      last5.push({
        date:   dates[i],
        precip: precip[i] || 0,
        tempC:  tempMax[i],
        tempF:  Math.round(tempMax[i] * 9/5 + 32),
      });
    }
    wxData[id] = {
      tempC,
      tempF:      Math.round(tempC * 9/5 + 32),
      precip30mm: Math.round(precip.slice(0,30).reduce((a,v)=>a+(v||0),0)),
      precip7mm:  Math.round(precip.slice(0,7).reduce((a,v)=>a+(v||0),0)),
      daily5:     last5,
    };
  } catch { wxData[id] = null; }

  if (isProduce) {
    refreshProduceMarker(id);
    if (id === activeKey) fillPanel(id);
  } else {
    placeWxMarker(id);
  }
}

// ══════════════════════════════════════════════════════════
//  PRODUCE MARKERS
// ══════════════════════════════════════════════════════════
function pinHTML(key) {
  const p = PRODUCE[key], w = wxData[key];
  const wx = w ? classifyWx(w.tempC, w.precip7mm) : null;
  const glowStyle = wx ? wxGlowStyle(wx) : '';
  const bubbleStyle = wx ? glowStyle : 'background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.18)';
  const needsPulse = wx && ['EXTREME HEAT','FLOODING','HARD FREEZE','HEAVY RAIN','HEAT WAVE','FREEZE'].includes(wx.label);
  const pulseColor = wx ? wx.color : 'rgba(255,255,255,0.3)';
  const pulse = needsPulse ? `<div class="pin-pulse" style="border:2.5px solid ${pulseColor}"></div>` : '';
  const badge = wx ? `<div class="pin-wx">${wx.emoji}</div>` : '';
  const condColor = wx ? wx.color : 'rgba(255,255,255,.3)';
  const condText  = wx ? wx.label : '…';
  return `<div class="pin" data-key="${key}">
    <div class="pin-bubble" style="${bubbleStyle}">${pulse}${p.emoji}${badge}</div>
    <div class="pin-label">
      <div class="pin-temp">${w ? w.tempF+'°' : '…'}</div>
      <div class="pin-cond" style="color:${condColor}">${condText}</div>
    </div>
  </div>`;
}

function makeProduceIcon(key) {
  return L.divIcon({
    className: '',
    html: pinHTML(key),
    iconSize: [60, 82],
    iconAnchor: [30, 41],
  });
}

function createProduceMarker(key) {
  const r = PRODUCE[key].r;
  const marker = L.marker([r.lat, r.lng], { icon: makeProduceIcon(key) });
  marker.on('click', () => openPanel(key));
  marker.addTo(map);
  leafMarkers[key] = marker;
}

function refreshProduceMarker(key) {
  if (leafMarkers[key]) leafMarkers[key].setIcon(makeProduceIcon(key));
}

// ══════════════════════════════════════════════════════════
//  WEATHER OVERLAY MARKERS
// ══════════════════════════════════════════════════════════
const wxMarkers = {};

function placeWxMarker(id) {
  const st = STATIONS.find(s => s.id === id);
  if (!st) return;
  const w = wxData[id];
  if (!w) return;
  const wx = classifyWx(w.tempC, w.precip7mm);
  if (!wx) return;
  if (wxMarkers[id]) { map.removeLayer(wxMarkers[id]); delete wxMarkers[id]; }
  const icon = L.divIcon({
    className: '',
    html: `<div class="wx">
      <div class="wx-ico">${wx.emoji}</div>
      <div class="wx-tag" style="color:${wx.color};border-color:${wx.color}55">${wx.label}</div>
    </div>`,
    iconSize: [70, 52],
    iconAnchor: [35, 26],
  });
  const marker = L.marker([st.lat, st.lng], { icon, interactive:false, zIndexOffset:-100 });
  marker.addTo(map);
  wxMarkers[id] = marker;
}

// ══════════════════════════════════════════════════════════
//  SHOW / HIDE OTHER PRODUCE MARKERS
// ══════════════════════════════════════════════════════════
function hideOthers(key) {
  // Ensure active marker is on map first (fixes direct-switch bug)
  if (leafMarkers[key] && !map.hasLayer(leafMarkers[key])) {
    leafMarkers[key].addTo(map);
  }
  Object.entries(leafMarkers).forEach(([k, m]) => {
    if (k !== key) map.removeLayer(m);
  });
}
function showAll() {
  Object.entries(leafMarkers).forEach(([k, m]) => {
    if (!map.hasLayer(m)) m.addTo(map);
  });
}

// ══════════════════════════════════════════════════════════
//  FOCUSED WEATHER OVERLAYS — show wx only at active regions
// ══════════════════════════════════════════════════════════
const focusedWxMarkers = [];

function hideAllWxMarkers() {
  Object.values(wxMarkers).forEach(m => map.removeLayer(m));
}
function showAllWxMarkers() {
  Object.values(wxMarkers).forEach(m => { if (!map.hasLayer(m)) m.addTo(map); });
}
function clearFocusedWx() {
  focusedWxMarkers.forEach(m => map.removeLayer(m));
  focusedWxMarkers.length = 0;
}

function showFocusedWx(key) {
  clearFocusedWx();
  hideAllWxMarkers();

  // Show wx at primary region using already-fetched produce weather data
  const w = wxData[key];
  const p = PRODUCE[key];
  if (w) {
    const wx = classifyWx(w.tempC, w.precip7mm);
    if (wx) {
      const icon = L.divIcon({
        className: '',
        html: `<div class="wx">
          <div class="wx-ico">${wx.emoji}</div>
          <div class="wx-tag" style="color:${wx.color};border-color:${wx.color}55">${wx.label}</div>
        </div>`,
        iconSize: [70, 52], iconAnchor: [35, 26],
      });
      const m = L.marker([p.r.lat, p.r.lng], { icon, interactive:false, zIndexOffset:-50 });
      m.addTo(map);
      focusedWxMarkers.push(m);
    }
  }
}

// ══════════════════════════════════════════════════════════
//  SECONDARY REGION MARKERS — B&W, full opacity
// ══════════════════════════════════════════════════════════
const secMarkers = [];

function clearSecondary() {
  secMarkers.forEach(m => map.removeLayer(m));
  secMarkers.length = 0;
}

function showSecondary(key) {
  clearSecondary();
  const p = PRODUCE[key];
  if (!p.alt || !p.alt.length) return;
  p.alt.forEach(a => {
    const icon = L.divIcon({
      className: '',
      html: `<div class="pin-sec">
        <div class="pin-sec-bubble">${p.emoji}</div>
        <div class="pin-sec-label">
          <div class="pin-sec-name">${a.name}</div>
          <div class="pin-sec-share">${a.share}% of supply</div>
        </div>
      </div>`,
      iconSize: [90, 60],
      iconAnchor: [45, 30],
    });
    const m = L.marker([a.lat, a.lng], { icon, interactive:false, zIndexOffset:-200 });
    m.addTo(map);
    secMarkers.push(m);
  });
}

// ══════════════════════════════════════════════════════════
//  DETAIL PANEL
// ══════════════════════════════════════════════════════════
function openPanel(key) {
  activeKey = key;
  buildPills(); // rebuilds with correct active state
  fillPanel(key);
  document.getElementById('detail').style.display = 'block';
  hideOthers(key);
  showSecondary(key);
  showFocusedWx(key);

  // Fit map to primary + all secondary regions
  const p = PRODUCE[key];
  const ov = OVERRIDES[key];
  const primaryLatLng = ov ? [ov.region.lat, ov.region.lng] : [p.r.lat, p.r.lng];
  const latlngs = [primaryLatLng];
  (p.alt || []).forEach(a => latlngs.push([a.lat, a.lng]));
  const bounds = L.latLngBounds(latlngs);
  map.flyToBounds(bounds, { padding:[80, 80], duration:1.6, easeLinearity:0.4, maxZoom:7 });
}

function fillPanel(key) {
  const p = PRODUCE[key], w = wxData[key];
  const ov = OVERRIDES[key];
  const r = ov ? { ...p.r, name: ov.region.name } : p.r;
  const wx = w ? classifyWx(w.tempC, w.precip7mm) : null;

  const emojiEl = document.getElementById('d-emoji');
  if (typeof p.emoji === 'string' && p.emoji.trim().startsWith('<svg')) {
    emojiEl.innerHTML = p.emoji;
  } else {
    emojiEl.textContent = p.emoji;
  }
  document.getElementById('d-name').textContent   = p.name.toUpperCase();

  // Region line — show vendor if override has one
  const regionEl = document.getElementById('d-region');
  let regionText = `${r.name} · ${r.share}% of US supply`;
  if (ov && ov.vendor) regionText += ` · ${ov.vendor}`;
  regionEl.textContent = regionText;

  // Badge driven by wx condition
  const bd = document.getElementById('d-badge');
  if (wx) {
    const c = wx.color;
    const ri = parseInt(c.slice(1,3),16), gi = parseInt(c.slice(3,5),16), bi = parseInt(c.slice(5,7),16);
    bd.textContent = wx.label;
    bd.style.background = `rgba(${ri},${gi},${bi},0.15)`;
    bd.style.color = c; bd.style.border = `1px solid ${c}`;
  } else {
    bd.textContent = '…'; bd.style.background = 'transparent';
    bd.style.color = 'rgba(255,255,255,.3)'; bd.style.border = '1px solid rgba(255,255,255,.1)';
  }

  document.getElementById('ds-temp').textContent  = w ? `${w.tempF}°F` : '…';
  document.getElementById('ds-rain').textContent  = w ? `${w.precip7mm}mm` : '…';
  document.getElementById('ds-rain-s').textContent = w ? `past 7 days` : '';
  const cv = document.getElementById('ds-cond');
  cv.textContent = wx ? `${wx.emoji} ${wx.label}` : '…';
  cv.style.color = wx ? wx.color : '#fff'; cv.style.fontSize = '15px';
  document.getElementById('ds-cond-s').textContent = w ? `${w.tempF > 50 ? 'Growing season' : 'Off season'}` : '';
  document.getElementById('ds-share').textContent  = `${r.share}%`;
  document.getElementById('d-note').textContent    = r.note;
  document.getElementById('d-usda').innerHTML      = `📋 USDA: <a href="${p.usda.pdf}" target="_blank">${p.usda.n} ↗</a>`;

  // ── SEASON CHART with bell curve overlay ──
  const sc = document.getElementById('d-season');
  if (p.season) {
    const now = new Date().getMonth(); // 0=Jan
    const MONTHS = ['J','F','M','A','M','J','J','A','S','O','N','D'];
    const peak = Math.max(...p.season);
    // Build bars
    const barsHTML = p.season.map((v, i) => {
      const pct = Math.round((v / 1.0) * 100);
      const isNow = i === now;
      const barColor = isNow
        ? `rgba(57,224,122,${0.4 + v * 0.6})`
        : v >= 0.8 ? `rgba(57,224,122,${0.25 + v * 0.4})`
        : v >= 0.5 ? `rgba(57,224,122,${0.15 + v * 0.3})`
        : `rgba(255,255,255,${0.05 + v * 0.1})`;
      return `<div class="sc-bar" style="height:${Math.max(3, pct)}%;background:${barColor};${isNow ? 'box-shadow:0 0 6px rgba(57,224,122,.5)' : ''}"></div>`;
    }).join('');

    // Bell curve SVG overlay — smooth gaussian-ish path through the season values
    const W = 276, H = 28; // approximate rendered width / height
    const pts = p.season.map((v, i) => {
      const x = (i / 11) * W;
      const y = H - (v / 1.0) * H;
      return `${x},${y}`;
    });
    // Smooth via cubic bezier through control points
    const pathD = pts.reduce((acc, pt, i, arr) => {
      if (i === 0) return `M ${pt}`;
      const prev = arr[i - 1].split(',').map(Number);
      const curr = pt.split(',').map(Number);
      const cpx = (prev[0] + curr[0]) / 2;
      return `${acc} C ${cpx},${prev[1]} ${cpx},${curr[1]} ${curr[0]},${curr[1]}`;
    }, '');

    const monthsHTML = MONTHS.map((m, i) =>
      `<div class="sc-mon${i === now ? ' now' : ''}">${m}</div>`
    ).join('');

    // Current month indicator line
    const nowX = (now / 11) * 100;

    sc.innerHTML = `
      <div class="sc-label">Growing Season</div>
      <div class="sc-wrap">
        <div class="sc-bars">${barsHTML}</div>
        <svg class="sc-curve" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
          <path d="${pathD}" stroke="rgba(57,224,122,0.7)" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="sc-months">${monthsHTML}</div>`;
  } else {
    sc.innerHTML = '';
  }

  // ── 5-DAY EMOJI FORECAST ──
  const fc = document.getElementById('d-forecast');
  if (w && w.daily5 && w.daily5.length) {
    const maxPrecip = Math.max(...w.daily5.map(d => d.precip), 1);
    const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const dayHTML = w.daily5.map(d => {
      const dt   = new Date(d.date + 'T12:00:00');
      const dow  = days[dt.getDay()];
      const dayWx = classifyWx(d.tempC, d.precip);
      const barPct = Math.round((d.precip / maxPrecip) * 100);
      return `<div class="fc-day">
        <div class="fc-dow">${dow}</div>
        <div class="fc-ico">${dayWx.emoji}</div>
        <div class="fc-tmp">${d.tempF}°</div>
        <div class="fc-bar"><div class="fc-bar-fill" style="width:${barPct}%"></div></div>
      </div>`;
    }).join('');
    fc.innerHTML = `<div class="fc-label">5-Day History</div><div class="fc-days">${dayHTML}</div>`;
  } else {
    fc.innerHTML = '';
  }
}

// ── CLOSE PANEL ──
function closePanel() {
  const el = document.getElementById('detail');
  el.style.transition = 'transform .25s cubic-bezier(.4,0,.2,1), opacity .2s';
  el.style.transform = 'translateY(110%)';
  el.style.opacity = '0';
  setTimeout(() => {
    el.style.display = 'none';
    el.style.transform = '';
    el.style.opacity = '';
    el.style.transition = '';
  }, 260);
  activeKey = null;
  buildPills();
  clearSecondary();
  clearFocusedWx();
  showAllWxMarkers();
  showAll();
}

document.getElementById('d-close').onclick = closePanel;

// Tap map to close on mobile
map.on('click', () => {
  if (activeKey && window.innerWidth <= 768) closePanel();
});

// ── SWIPE TO CLOSE / DRAG DRAWER ──
(function() {
  const el = document.getElementById('detail');
  let startY = 0, startX = 0, currentY = 0, dragging = false;
  const CLOSE_THRESHOLD = 80; // px pulled down to trigger close

  el.addEventListener('touchstart', e => {
    if (window.innerWidth > 768) return;
    // Only start drag if touching the handle area (top 48px of panel)
    const touch = e.touches[0];
    const rect = el.getBoundingClientRect();
    if (touch.clientY - rect.top > 48) return;
    startY = touch.clientY;
    startX = touch.clientX;
    currentY = 0;
    dragging = true;
    el.style.transition = 'none';
  }, { passive: true });

  el.addEventListener('touchmove', e => {
    if (!dragging || window.innerWidth > 768) return;
    const touch = e.touches[0];
    const diffX = Math.abs(touch.clientX - startX);
    currentY = touch.clientY - startY;
    // Only track downward vertical movement, ignore horizontal scrolling
    if (diffX > 20 || currentY < 0) { dragging = false; return; }
    el.style.transform = `translateY(${currentY}px)`;
    el.style.opacity = `${Math.max(0.3, 1 - currentY / 250)}`;
  }, { passive: true });

  el.addEventListener('touchend', () => {
    if (!dragging || window.innerWidth > 768) return;
    dragging = false;
    if (currentY > CLOSE_THRESHOLD) {
      closePanel();
    } else {
      // Snap back
      el.style.transition = 'transform .2s cubic-bezier(.4,0,.2,1), opacity .15s';
      el.style.transform = '';
      el.style.opacity = '';
      setTimeout(() => { el.style.transition = ''; }, 200);
    }
  });
})();

// ══════════════════════════════════════════════════════════
//  PILLS + CATEGORY TABS
// ══════════════════════════════════════════════════════════
let activeCat = 'all';

function buildPills() {
  const container = document.getElementById('pills');
  container.innerHTML = '';
  Object.entries(PRODUCE).forEach(([key, p]) => {
    if (activeCat !== 'all' && p.cat !== activeCat) return;
    const btn = document.createElement('button');
    btn.className = 'pill'; btn.dataset.key = key;
    btn.innerHTML = `<span style="font-size:14px">${p.emoji}</span>${p.name}`;
    if (key === activeKey) btn.classList.add('active');
    btn.onclick = () => {
      if (activeKey === key) {
        closePanel();
      } else { openPanel(key); }
    };
    container.appendChild(btn);
  });
}

document.querySelectorAll('.cat-tab').forEach(tab => {
  tab.onclick = () => {
    activeCat = tab.dataset.cat;
    document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    buildPills();
  };
});

buildPills();

// ── INIT — markers placed + weather fetched + sheet loaded ──
Object.entries(PRODUCE).forEach(([key, p]) => {
  createProduceMarker(key);
  fetchWx(key, p.r.lat, p.r.lng, true);
});
STATIONS.forEach(st => fetchWx(st.id, st.lat, st.lng, false));
loadSheet();
</script>
