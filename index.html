<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HarvestWatch</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --green:#39e07a; --yellow:#f5c842; --orange:#f57c42; --red:#f5424e;
  --panel-bg:rgba(4,9,18,0.94); --border:rgba(255,255,255,0.10);
}
* { box-sizing:border-box; margin:0; padding:0; }
html, body { width:100%; height:100%; overflow:hidden; font-family:'Barlow',sans-serif; background:#050e1c; }

/* ── MAP fills everything ── */
#map { position:absolute; inset:0; z-index:0; }

/* Scanline broadcast feel */
#map::after {
  content:''; position:absolute; inset:0; pointer-events:none; z-index:500;
  background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.025) 2px,rgba(0,0,0,0.025) 3px);
}

/* Darken satellite tiles so neon pins pop */
.leaflet-tile-pane { filter: brightness(0.55) saturate(0.8); }

/* ── PRODUCE PIN markers ── */
.pin {
  display:flex; flex-direction:column; align-items:center; gap:3px;
  cursor:pointer; transition:transform .15s;
}
.pin:hover { transform:scale(1.1); }
.pin-bubble {
  width:52px; height:52px; border-radius:50%;
  display:flex; align-items:center; justify-content:center; font-size:23px;
  position:relative; border:2.5px solid; backdrop-filter:blur(6px);
}
.g0,.g1,.g2,.g3 { /* colors now set via inline style by wxGlowStyle() */ }
.gx { background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.18); }
.pin-pulse {
  position:absolute; inset:-3px; border-radius:50%; pointer-events:none;
  animation:ppulse 2.4s ease infinite;
}
@keyframes ppulse { 0%{transform:scale(1);opacity:.55} 70%{transform:scale(2.3);opacity:0} 100%{transform:scale(2.3);opacity:0} }
.pin-wx { position:absolute; bottom:-4px; right:-6px; font-size:15px; line-height:1; filter:drop-shadow(0 1px 4px rgba(0,0,0,.9)); }
.pin-label {
  background:rgba(4,9,18,.86); border:1px solid rgba(255,255,255,.12);
  border-radius:8px; padding:2px 8px;
  display:flex; flex-direction:column; align-items:center;
  backdrop-filter:blur(10px); min-width:48px;
}
.pin-temp { font-family:'Barlow Condensed',sans-serif; font-size:14px; font-weight:800; color:#fff; line-height:1.2; }
.pin-cond { font-family:'Barlow Condensed',sans-serif; font-size:8px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; line-height:1; }

/* ── WEATHER OVERLAY markers ── */
.wx {
  display:flex; flex-direction:column; align-items:center; gap:1px;
  animation:wxin .7s ease both; pointer-events:none;
}
@keyframes wxin { from{opacity:0;transform:scale(.5)} to{opacity:1;transform:scale(1)} }
.wx-ico { font-size:26px; line-height:1; animation:wxbob 3s ease-in-out infinite; }
@keyframes wxbob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
.wx-tag {
  font-family:'Barlow Condensed',sans-serif; font-size:8px; font-weight:800;
  letter-spacing:1.5px; text-transform:uppercase;
  background:rgba(4,9,18,.78); border-radius:4px; padding:1px 5px;
  border:1px solid; white-space:nowrap; backdrop-filter:blur(8px);
}

/* ── TOP BAR ── */
#topbar {
  position:absolute; top:0; left:0; right:0; z-index:800; pointer-events:none;
  padding:10px 18px; display:flex; align-items:center; justify-content:space-between;
  background:linear-gradient(to bottom,rgba(4,9,18,.97) 45%,transparent);
}
#logo-name { font-family:'Barlow Condensed',sans-serif; font-size:24px; font-weight:900; color:#fff; letter-spacing:1px; text-transform:uppercase; }
#logo-sub  { font-family:'Barlow Condensed',sans-serif; font-size:9px; font-weight:700; letter-spacing:3px; color:var(--green); text-transform:uppercase; }
#live-badge { display:flex; align-items:center; gap:6px; font-family:'Barlow Condensed',sans-serif; font-size:10px; font-weight:700; letter-spacing:2px; color:var(--green); text-transform:uppercase; }
.ldot { width:6px; height:6px; border-radius:50%; background:var(--green); animation:blink 1.4s ease infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.15} }

/* ── PICKER ── */
#picker {
  position:absolute; bottom:0; left:0; right:0; z-index:800;
  padding:10px 16px 14px;
  background:linear-gradient(to top,rgba(4,9,18,.98) 60%,transparent);
}
#picker-label { font-family:'Barlow Condensed',sans-serif; font-size:9px; font-weight:700; letter-spacing:3px; color:rgba(255,255,255,.25); text-transform:uppercase; margin-bottom:6px; }
#pills { display:flex; gap:5px; flex-wrap:wrap; }
.pill {
  display:flex; align-items:center; gap:5px; padding:5px 13px; border-radius:100px;
  border:1.5px solid rgba(255,255,255,.13); background:rgba(255,255,255,.05);
  color:rgba(255,255,255,.45); font-family:'Barlow Condensed',sans-serif;
  font-size:13px; font-weight:700; cursor:pointer; transition:all .18s; white-space:nowrap;
  backdrop-filter:blur(6px);
}
.pill:hover  { border-color:rgba(255,255,255,.3); color:rgba(255,255,255,.8); }
.pill.active { border-color:var(--green); background:rgba(57,224,122,.12); color:#fff; box-shadow:0 0 14px rgba(57,224,122,.2); }

/* ── DETAIL PANEL — right side ── */
#detail {
  position:absolute; top:60px; right:14px; bottom:100px; z-index:810;
  width:340px;
  background:var(--panel-bg); border:1px solid var(--border); border-radius:13px;
  backdrop-filter:blur(28px); padding:13px 16px; display:none;
  animation:sup .2s ease; overflow-y:auto;
}
@keyframes sup { from{opacity:0;transform:translateX(10px)} to{opacity:1;transform:translateX(0)} }
#d-close { position:absolute; top:9px; right:12px; font-size:15px; color:rgba(255,255,255,.28); cursor:pointer; background:none; border:none; transition:color .12s; }
#d-close:hover { color:#fff; }
#d-top { display:flex; align-items:center; gap:9px; margin-bottom:9px; }
#d-emoji { font-size:30px; flex-shrink:0; }
#d-name   { font-family:'Barlow Condensed',sans-serif; font-size:24px; font-weight:900; color:#fff; text-transform:uppercase; line-height:1; }
#d-region { font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:600; letter-spacing:.6px; color:rgba(255,255,255,.38); margin-top:1px; }
#d-badge  { margin-left:auto; flex-shrink:0; padding:3px 10px; border-radius:100px; font-family:'Barlow Condensed',sans-serif; font-size:10px; font-weight:800; letter-spacing:1.5px; text-transform:uppercase; }
#d-stats  { display:flex; border-top:1px solid var(--border); border-bottom:1px solid var(--border); margin-bottom:9px; }
.ds { flex:1; padding:7px 10px; border-right:1px solid var(--border); }
.ds:last-child { border-right:none; }
.ds-l { font-family:'Barlow Condensed',sans-serif; font-size:8px; font-weight:700; letter-spacing:2px; color:rgba(255,255,255,.28); text-transform:uppercase; margin-bottom:2px; }
.ds-v { font-family:'Barlow Condensed',sans-serif; font-size:20px; font-weight:800; color:#fff; line-height:1; }
.ds-s { font-size:9px; color:rgba(255,255,255,.32); margin-top:1px; }
#d-note { font-size:12px; color:rgba(255,255,255,.5); line-height:1.5; margin-bottom:7px; }
#d-usda { font-family:'Barlow Condensed',sans-serif; font-size:10px; letter-spacing:.4px; }
#d-usda a { color:var(--green); text-decoration:none; }
#d-usda a:hover { text-decoration:underline; }

/* Leaflet overrides */
.leaflet-control-zoom { border:1px solid rgba(255,255,255,.12) !important; background:rgba(4,9,18,.85) !important; }
.leaflet-control-zoom a { background:transparent !important; color:rgba(255,255,255,.55) !important; border-bottom:1px solid rgba(255,255,255,.1) !important; line-height:26px !important; }
.leaflet-control-zoom a:hover { color:#fff !important; }
.leaflet-control-attribution { display:none !important; }
/* Kill default marker blue dot */
.leaflet-div-icon { background:none !important; border:none !important; }
</style>
</head>
<body>

<div id="map"></div>

<!-- TOP BAR -->
<div id="topbar">
  <div>
    <div id="logo-name">🌱 HarvestWatch</div>
    <div id="logo-sub">Jeffco Produce Origins &amp; Live Weather</div>
  </div>
  <div id="live-badge"><div class="ldot"></div>Open-Meteo Live</div>
</div>

<!-- DETAIL PANEL -->
<div id="detail">
  <button id="d-close">✕</button>
  <div id="d-top">
    <span id="d-emoji"></span>
    <div><div id="d-name"></div><div id="d-region"></div></div>
    <div id="d-badge"></div>
  </div>
  <div id="d-stats">
    <div class="ds"><div class="ds-l">Temp</div><div class="ds-v" id="ds-temp">—</div><div class="ds-s">Current</div></div>
    <div class="ds"><div class="ds-l">7-Day Rain</div><div class="ds-v" id="ds-rain">—</div><div class="ds-s" id="ds-rain-s"></div></div>
    <div class="ds"><div class="ds-l">Conditions</div><div class="ds-v" id="ds-cond">—</div><div class="ds-s" id="ds-cond-s"></div></div>
    <div class="ds"><div class="ds-l">Supply Share</div><div class="ds-v" id="ds-share">—</div><div class="ds-s">of US imports</div></div>
  </div>
  <div id="d-note"></div>
  <div id="d-usda"></div>
</div>

<!-- PICKER -->
<div id="picker">
  <div id="picker-label">Select Produce</div>
  <div id="pills"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
// ══════════════════════════════════════════════════════════
//  MAP — Leaflet with dark satellite-style tiles
//  Centered on Americas, no pan/zoom limits so user can explore
// ══════════════════════════════════════════════════════════
const map = L.map('map', {
  center: [35, -105],  // Western Americas bias — WA down to Chile all visible
  zoom: 3,
  zoomControl: false,
  attributionControl: false,
});
L.control.zoom({ position:'topright' }).addTo(map);

// ESRI World Imagery — real satellite photo tiles, no API key needed
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  maxZoom: 19,
  attribution: 'Tiles © Esri',
}).addTo(map);

// ══════════════════════════════════════════════════════════
//  PRODUCE — one primary sourcing region per item
// ══════════════════════════════════════════════════════════

    <line x1="13" y1="25" x2="13" y2="26" stroke="#c8d4b8" stroke-width="0.8" stroke-linecap="round"/>

    <path d="M16 20 Q17 14 16 8 Q15.5 4 15 2" stroke="#4a8c3f" stroke-width="2" stroke-linecap="round" fill="none"/>
  </svg>`,

  cauliflower: `<svg width="26" height="26" viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg">

    <path d="M21 16 Q24 10 20 8 Q17 12 18 16Z" fill="#4a8c3f"/>
    <path d="M8 18 Q5 14 7 11 Q11 14 10 18Z" fill="#3a8040"/>

    <!-- curd bumps -->
    <circle cx="13" cy="9"  r="4.5" fill="#f0ede0"/>

    <circle cx="16" cy="8"  r="3"   fill="#f4f1e4"/>

    <!-- texture bumps -->
    <circle cx="11" cy="10" r="1.2" fill="#e0dcc8"/>
    <circle cx="15" cy="10" r="1.2" fill="#e0dcc8"/>
    <circle cx="13" cy="12" r="1.2" fill="#e0dcc8"/>
    <circle cx="9"  cy="13" r="1"   fill="#dbd7c4"/>
    <circle cx="17" cy="13" r="1"   fill="#dbd7c4"/>
  </svg>`,
};

// WA-perspective sourcing: closest/most likely origin for a Seattle-area grocery store
const PRODUCE = {
  avocado:    { name:'Avocado',     emoji:'🥑', r:{ name:'Michoacán, MX',        flag:'🇲🇽', lat:19.5,  lng:-101.9, share:65, base:55,  note:'World\'s largest avocado region. ~65% of US supply. Drought here moves prices at every WA grocery store within weeks.'              }, usda:{ n:'LA Terminal – Fruit',      pdf:'https://www.ams.usda.gov/mnreports/HC_FV010.pdf' }},

  orange:     { name:'Orange',      emoji:'🍊', r:{ name:'San Joaquin Valley, CA',flag:'🇺🇸', lat:36.4,  lng:-119.4, share:60, base:45,  note:'CA Navel oranges (Dec–Apr) are the primary WA store orange. San Joaquin Valley ships north. Florida navels rarely reach the PNW.'    }, usda:{ n:'LA Terminal – Fruit',      pdf:'https://www.ams.usda.gov/mnreports/HC_FV010.pdf' }},
  grape:      { name:'Grape',       emoji:'🍇', r:{ name:'Atacama, Chile',         flag:'🇨🇱', lat:-28.5, lng:-70.5,  share:40, base:8,   note:'Winter table grapes in WA stores (Nov–Apr) ship from Chile\'s Atacama. Dry harvest weather is ideal — rain causes splitting.'        }, usda:{ n:'Miami SP – Fruit Imports', pdf:'https://www.ams.usda.gov/mnreports/MH_FV111.pdf' }},
  mango:      { name:'Mango',       emoji:'🥭', r:{ name:'Guerrero, MX',           flag:'🇲🇽', lat:17.5,  lng:-100.5, share:60, base:80,  note:'Mexico\'s Pacific coast supplies 60% of US mangoes reaching WA. Ataulfo and Tommy Atkins varieties dominate PNW shelves.'           }, usda:{ n:'Miami SP – Fruit Imports', pdf:'https://www.ams.usda.gov/mnreports/MH_FV111.pdf' }},
  potato:     { name:'Potato',      emoji:'🥔', r:{ name:'Columbia Basin, WA',     flag:'🇺🇸', lat:46.8,  lng:-119.5, share:25, base:30,  note:'WA is the #1 US potato state — your grocery store Russets likely came from the Columbia Basin (Othello/Moses Lake area) or just over the border in Idaho.' }, usda:{ n:'Seattle SP – Vegetables',  pdf:'https://www.ams.usda.gov/mnreports/AR_FV120.pdf' }},

  cauliflower:{ name:'Cauliflower', emoji:SVG.cauliflower, r:{ name:'Salinas Valley, CA',     flag:'🇺🇸', lat:36.4,  lng:-121.4, share:75, base:40,  note:'Salinas Valley produces ~75% of US cauliflower. The cool coastal fog is essential — heat causes browning. WA stores source from here year-round.' }, usda:{ n:'Fresno SP – Vegetables',   pdf:'https://www.ams.usda.gov/mnreports/FR_FV120.pdf' }},
};

// ══════════════════════════════════════════════════════════
//  WEATHER STATIONS — Americas regional coverage
// ══════════════════════════════════════════════════════════
const STATIONS = [
  { id:'sw_us',     lat:36,   lng:-116,  label:'SW USA'       },
  { id:'pnw',       lat:47,   lng:-122,  label:'Pacific NW'   },
  { id:'cal_cen',   lat:37,   lng:-120,  label:'Central CA'   },
  { id:'plains',    lat:41,   lng:-100,  label:'Great Plains'  },
  { id:'se_us',     lat:33,   lng:-86,   label:'SE USA'        },
  { id:'ne_us',     lat:43,   lng:-72,   label:'NE USA'        },
  { id:'midwest',   lat:42,   lng:-90,   label:'Midwest'       },
  { id:'n_mex',     lat:28,   lng:-106,  label:'N. Mexico'     },
  { id:'s_mex',     lat:18,   lng:-96,   label:'S. Mexico'     },
  { id:'c_am',      lat:13,   lng:-86,   label:'C. America'    },
  { id:'carib',     lat:20,   lng:-75,   label:'Caribbean'     },
  { id:'colombia',  lat:5,    lng:-75,   label:'Colombia'      },
  { id:'amazon',    lat:-5,   lng:-63,   label:'Amazon'        },
  { id:'ne_braz',   lat:-10,  lng:-48,   label:'NE Brazil'     },
  { id:'c_chile',   lat:-33,  lng:-70,   label:'Central Chile' },
  { id:'patagonia', lat:-48,  lng:-68,   label:'Patagonia'     },
  { id:'s_brazil',  lat:-23,  lng:-48,   label:'SE Brazil'     },
  { id:'peru_coast',lat:-12,  lng:-76,   label:'Peru Coast'    },
  { id:'texas',     lat:30,   lng:-98,   label:'Texas'         },
  { id:'florida',   lat:27,   lng:-82,   label:'Florida'       },
];

// ══════════════════════════════════════════════════════════
//  WEATHER CLASSIFICATION
//  Always returns a condition — every station shows current weather.
//  Ordered: most severe first, catch-all at the bottom.
// ══════════════════════════════════════════════════════════
function classifyWx(tempC, precip7) {
  const tF = tempC * 9/5 + 32;

  // Severe / extreme
  if (tF >= 105)               return { emoji:'🔥', label:'EXTREME HEAT', color:'#f5224e' };
  if (precip7 >= 100)         return { emoji:'🌊', label:'FLOODING',      color:'#2050f0' };
  if (tF <= 15)                return { emoji:'🥶', label:'HARD FREEZE',  color:'#42d4f5' };
  if (precip7 >= 60)          return { emoji:'⛈️',  label:'HEAVY RAIN',   color:'#4870e8' };
  if (tF >= 95)                return { emoji:'☀️',  label:'HEAT WAVE',   color:'#f59200' };
  if (tF <= 28)                return { emoji:'❄️',  label:'FREEZE',      color:'#80d0f5' };

  // Notable
  if (precip7 >= 35)          return { emoji:'🌧️', label:'WET',           color:'#6899e8' };
  if (precip7 < 3 && tF > 85) return { emoji:'🏜️', label:'DROUGHT',      color:'#f5882a' };
  if (tF >= 88)                return { emoji:'🌡️', label:'VERY HOT',     color:'#f5b830' };
  if (tF <= 36)                return { emoji:'🌨️', label:'NEAR FREEZE',  color:'#a0d0f0' };
  if (precip7 >= 18)          return { emoji:'🌦️', label:'SHOWERY',      color:'#7899d8' };
  if (tF <= 45)                return { emoji:'🌬️', label:'COLD',         color:'#90c8e8' };
  if (precip7 < 5 && tF > 75) return { emoji:'🌤️', label:'DRY',          color:'#e8c030' };
  if (tF >= 78)                return { emoji:'🌞', label:'WARM',         color:'#d4a820' };

  // Catch-all — always show something
  if (precip7 >= 8)            return { emoji:'🌥️', label:'OVERCAST',     color:'#8899aa' };
  if (tF >= 60)                return { emoji:'🌈', label:'MILD',          color:'#70b888' };
  if (tF >= 48)                return { emoji:'🌥️', label:'COOL',         color:'#8899aa' };
  return                              { emoji:'🌨️', label:'CHILLY',        color:'#90b8d0' };
}

// ══════════════════════════════════════════════════════════
//  PIN COLORING — driven by classifyWx at that location,
//  same system as the weather overlays. No drought scoring.
// ══════════════════════════════════════════════════════════
function wxGlowStyle(wx) {
  // Returns inline style string for the bubble based on wx condition color
  if (!wx) return '';
  const c = wx.color;
  // Parse hex to rgba for background tint
  const r = parseInt(c.slice(1,3),16), g = parseInt(c.slice(3,5),16), b = parseInt(c.slice(5,7),16);
  return `background:rgba(${r},${g},${b},0.2);border-color:${c};box-shadow:0 0 22px rgba(${r},${g},${b},0.55)`;
}

// ══════════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════════
const wxData    = {};  // id → data | null
const leafMarkers = {}; // key → Leaflet marker
let activeKey   = null;

// ══════════════════════════════════════════════════════════
//  FETCH WEATHER
// ══════════════════════════════════════════════════════════
async function fetchWx(id, lat, lng, isProduce) {
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}`
      + `&current=temperature_2m&daily=precipitation_sum`
      + `&timezone=auto&past_days=30&forecast_days=1`;
    const d = await (await fetch(url)).json();
    const tempC = d.current.temperature_2m;
    const daily = d.daily.precipitation_sum || [];
    wxData[id] = {
      tempC,
      tempF:      Math.round(tempC * 9/5 + 32),
      precip30mm: Math.round(daily.slice(0,30).reduce((a,v)=>a+(v||0),0)),
      precip7mm:  Math.round(daily.slice(0,7).reduce((a,v)=>a+(v||0),0)),
    };
  } catch { wxData[id] = null; }

  if (isProduce) {
    refreshProduceMarker(id);
    if (id === activeKey) fillPanel(id);
  } else {
    placeWxMarker(id);
  }
}

// ══════════════════════════════════════════════════════════
//  PRODUCE MARKERS
// ══════════════════════════════════════════════════════════
function pinHTML(key) {
  const p = PRODUCE[key], w = wxData[key];
  const wx = w ? classifyWx(w.tempC, w.precip7mm) : null;
  const glowStyle = wx ? wxGlowStyle(wx) : '';
  const bubbleStyle = wx ? glowStyle : 'background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.18)';
  const needsPulse = wx && ['EXTREME HEAT','FLOODING','HARD FREEZE','HEAVY RAIN','HEAT WAVE','FREEZE'].includes(wx.label);
  const pulseColor = wx ? wx.color : 'rgba(255,255,255,0.3)';
  const pulse = needsPulse ? `<div class="pin-pulse" style="border:2.5px solid ${pulseColor}"></div>` : '';
  const badge = wx ? `<div class="pin-wx">${wx.emoji}</div>` : '';
  const condColor = wx ? wx.color : 'rgba(255,255,255,.3)';
  const condText  = wx ? wx.label : '…';
  return `<div class="pin" data-key="${key}">
    <div class="pin-bubble" style="${bubbleStyle}">${pulse}${p.emoji}${badge}</div>
    <div class="pin-label">
      <div class="pin-temp">${w ? w.tempF+'°' : '…'}</div>
      <div class="pin-cond" style="color:${condColor}">${condText}</div>
    </div>
  </div>`;
}

function makeProduceIcon(key) {
  return L.divIcon({
    className: '',
    html: pinHTML(key),
    iconSize: [60, 82],
    iconAnchor: [30, 41],
  });
}

function createProduceMarker(key) {
  const r = PRODUCE[key].r;
  const marker = L.marker([r.lat, r.lng], { icon: makeProduceIcon(key) });
  marker.on('click', () => openPanel(key));
  marker.addTo(map);
  leafMarkers[key] = marker;
}

function refreshProduceMarker(key) {
  if (leafMarkers[key]) leafMarkers[key].setIcon(makeProduceIcon(key));
}

// ══════════════════════════════════════════════════════════
//  WEATHER OVERLAY MARKERS
// ══════════════════════════════════════════════════════════
const wxMarkers = {};

function placeWxMarker(id) {
  const st = STATIONS.find(s => s.id === id);
  if (!st) return;
  const w = wxData[id];
  if (!w) return;
  const wx = classifyWx(w.tempC, w.precip7mm);
  if (!wx) return;
  if (wxMarkers[id]) { map.removeLayer(wxMarkers[id]); delete wxMarkers[id]; }
  const icon = L.divIcon({
    className: '',
    html: `<div class="wx">
      <div class="wx-ico">${wx.emoji}</div>
      <div class="wx-tag" style="color:${wx.color};border-color:${wx.color}55">${wx.label}</div>
    </div>`,
    iconSize: [70, 52],
    iconAnchor: [35, 26],
  });
  const marker = L.marker([st.lat, st.lng], { icon, interactive:false, zIndexOffset:-100 });
  marker.addTo(map);
  wxMarkers[id] = marker;
}

// ══════════════════════════════════════════════════════════
//  DETAIL PANEL
// ══════════════════════════════════════════════════════════
function openPanel(key) {
  activeKey = key;
  document.querySelectorAll('.pill').forEach(el => el.classList.toggle('active', el.dataset.key === key));
  fillPanel(key);
  document.getElementById('detail').style.display = 'block';
  // Fly the map to the growing region
  const r = PRODUCE[key].r;
  map.flyTo([r.lat, r.lng], 6, { duration: 1.4, easeLinearity: 0.4 });
}

function fillPanel(key) {
  const p = PRODUCE[key], r = p.r, w = wxData[key];
  const wx = w ? classifyWx(w.tempC, w.precip7mm) : null;

  document.getElementById('d-emoji').textContent  = p.emoji;
  document.getElementById('d-name').textContent   = p.name.toUpperCase();
  document.getElementById('d-region').textContent = `${r.flag} ${r.name} · ${r.share}% of US supply`;

  // Badge driven by wx condition
  const bd = document.getElementById('d-badge');
  if (wx) {
    const c = wx.color;
    const ri = parseInt(c.slice(1,3),16), gi = parseInt(c.slice(3,5),16), bi = parseInt(c.slice(5,7),16);
    bd.textContent = wx.label;
    bd.style.background = `rgba(${ri},${gi},${bi},0.15)`;
    bd.style.color = c; bd.style.border = `1px solid ${c}`;
  } else {
    bd.textContent = '…'; bd.style.background = 'transparent';
    bd.style.color = 'rgba(255,255,255,.3)'; bd.style.border = '1px solid rgba(255,255,255,.1)';
  }

  document.getElementById('ds-temp').textContent  = w ? `${w.tempF}°F` : '…';
  document.getElementById('ds-rain').textContent  = w ? `${w.precip7mm}mm` : '…';
  document.getElementById('ds-rain-s').textContent = w ? `past 7 days` : '';
  const cv = document.getElementById('ds-cond');
  cv.textContent = wx ? `${wx.emoji} ${wx.label}` : '…';
  cv.style.color = wx ? wx.color : '#fff'; cv.style.fontSize = '15px';
  document.getElementById('ds-cond-s').textContent = w ? `${w.tempF > 50 ? 'Growing season' : 'Off season'}` : '';
  document.getElementById('ds-share').textContent  = `${r.share}%`;
  document.getElementById('d-note').textContent    = r.note;
  document.getElementById('d-usda').innerHTML      = `📋 USDA: <a href="${p.usda.pdf}" target="_blank">${p.usda.n} ↗</a>`;
}

document.getElementById('d-close').onclick = () => {
  document.getElementById('detail').style.display = 'none';
  document.querySelectorAll('.pill').forEach(el => el.classList.remove('active'));
  activeKey = null;
};

// ══════════════════════════════════════════════════════════
//  PILLS
// ══════════════════════════════════════════════════════════
Object.entries(PRODUCE).forEach(([key, p]) => {
  const btn = document.createElement('button');
  btn.className = 'pill'; btn.dataset.key = key;
  btn.innerHTML = `<span style="font-size:14px">${p.emoji}</span>${p.name}`;
  btn.onclick = () => {
    if (activeKey === key) {
      document.getElementById('detail').style.display = 'none';
      btn.classList.remove('active'); activeKey = null;
    } else { openPanel(key); }
  };
  document.getElementById('pills').appendChild(btn);
});

// ── INIT — all markers placed + weather fetched in parallel ──
Object.entries(PRODUCE).forEach(([key, p]) => {
  createProduceMarker(key);
  fetchWx(key, p.r.lat, p.r.lng, true);
});
STATIONS.forEach(st => fetchWx(st.id, st.lat, st.lng, false));
</script>
</body>
</html>
